<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Room Battleship</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* ── THEME SYSTEM CSS VARS ────────────────────────────────────────── */
        :root {
            --theme-bg-primary:    #080e1a;
            --theme-bg-secondary:  #0d1525;
            --theme-bg-panel:      rgba(13,21,37,0.9);
            --theme-bg-surface:    #0f172a;
            --theme-bg-cell:       #020617;
            --theme-accent-gold:   #c9a84c;
            --theme-accent-blue:   #38bdf8;
            --theme-accent-red:    #ef4444;
            --theme-accent-green:  #22c55e;
            --theme-text-primary:  #e2e8f0;
            --theme-text-muted:    #94a3b8;
            --theme-text-faint:    #475569;
            --theme-border:        rgba(201,168,76,0.2);
            --theme-font:          'Cormorant Garamond', serif;
        }

        * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body {
            overscroll-behavior: none;
            background: radial-gradient(ellipse at 20% 50%, var(--theme-bg-secondary) 0%, var(--theme-bg-primary) 60%, #060b14 100%);
            font-family: var(--theme-font);
            color: var(--theme-text-primary);
        }

        .grid-cell {
            aspect-ratio: 1 / 1;
            transition: background-color 0.1s ease, box-shadow 0.1s ease;
            position: relative;
        }

        /* ── Ship overlay ─────────────────────────────────────────────────── */
        #self-board { position: relative; }
        #ship-overlay {
            position: absolute;
            top: 8px; left: 8px;
            pointer-events: none;
            z-index: 10;
        }

        .ship-sprite {
            position: absolute;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            image-rendering: pixelated;
            pointer-events: none;
            border-radius: 3px;
            will-change: transform;
        }
        .ship-sprite[data-ship-id="carrier"]    { background-image: url('battleship1.png'); }
        .ship-sprite[data-ship-id="battleship"] { background-image: url('battleship3.png'); }
        .ship-sprite[data-ship-id="destroyer"]  { background-image: url('battleship2.png'); }
        .ship-sprite[data-ship-id="submarine"]  { background-image: url('battleship4.png'); }
        .ship-sprite[data-ship-id="patrol"]     { background-image: url('battleship5.png'); }

        /* ── Placement frame pulse (border only) ──────────────────────────── */
        @keyframes framePulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(56,189,248,0), inset 0 0 0 0 rgba(56,189,248,0); border-color: #1e293b; }
            50%      { box-shadow: 0 0 18px 4px rgba(56,189,248,0.35), inset 0 0 8px rgba(56,189,248,0.08); border-color: rgba(56,189,248,0.6); }
        }
        .frame-pulse {
            animation: framePulse 2s ease-in-out infinite;
        }

        /* ── Hit / Miss / Sink ────────────────────────────────────────────── */
        @keyframes explode {
            0%   { transform: scale(0.3); opacity: 1; }
            40%  { transform: scale(1.4); opacity: 0.9; }
            100% { transform: scale(1);   opacity: 0; }
        }
        @keyframes splash {
            0%   { transform: scale(0) translateY(0); opacity: 1; }
            70%  { transform: scale(1.2) translateY(-4px); opacity: 0.8; }
            100% { transform: scale(1) translateY(0); opacity: 0; }
        }
        @keyframes sinkShip {
            0%   { opacity: 1; transform: translateY(0) rotate(0deg); filter: brightness(1); }
            30%  { opacity: 0.8; filter: brightness(0.5) sepia(1); }
            100% { opacity: 0; transform: translateY(8px) rotate(4deg); filter: brightness(0) sepia(1); }
        }
        @keyframes sinkCell {
            0%   { background-color: inherit; }
            30%  { background-color: rgba(239,68,68,0.5); }
            100% { background-color: rgba(20,28,40,0.9); }
        }
        @keyframes revealShip {
            0%   { opacity: 0; transform: scale(0.85); }
            60%  { opacity: 1; transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }

        .hit-fx {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; z-index: 5;
            animation: explode 0.5s ease-out forwards;
            pointer-events: none;
        }
        .miss-fx {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem; z-index: 5;
            animation: splash 0.4s ease-out forwards;
            pointer-events: none;
        }
        .ship-sprite.sinking { animation: sinkShip 1.4s ease-in forwards; }
        .cell-sinking        { animation: sinkCell 1.4s ease-in forwards; }
        .cell-revealed       { animation: revealShip 0.5s ease-out forwards; }

        /* ── Fleet status ─────────────────────────────────────────────────── */
        .fleet-status-row { display: flex; align-items: center; gap: 6px; }
        .fleet-pip {
            width: 10px; height: 10px; border-radius: 2px;
            background: #c9a84c; border: 1px solid #a07830;
            transition: background 0.3s;
        }
        .fleet-pip.hit  { background: #c0392b; border-color: #922b21; }
        .fleet-pip.sunk { background: #1e2530; border-color: #141920; }

        /* ── Drydock ──────────────────────────────────────────────────────── */
        .ship-dock-item { transition: all 0.15s ease; }
        .ship-dock-item.selected { border-color: #c9a84c; background-color: rgba(201,168,76,0.08); }
        .ship-dock-item.placed   { opacity: 0.55; border-color: #2a3245; }

        /* ── End game overlay ─────────────────────────────────────────────── */
        #endgame-overlay {
            position: fixed; inset: 0;
            background: rgba(2,6,23,0.9);
            backdrop-filter: blur(8px);
            flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100;
            overflow-y: auto;
            padding: 20px;
        }

        /* ── Touch ghost ──────────────────────────────────────────────────── */
        #touch-ghost {
            position: fixed;
            pointer-events: none;
            z-index: 200;
            background-size: 100% 100%;
            image-rendering: pixelated;
            border-radius: 3px;
            display: none;
            opacity: 0.85;
        }

        /* ── Pulse gold (lock button) ─────────────────────────────────────── */
        .pulse-gold { animation: pulseGold 1.5s ease-in-out infinite; }
        @keyframes pulseGold {
            0%,100% { box-shadow: 0 0 8px rgba(201,168,76,0.3); }
            50%      { box-shadow: 0 0 20px rgba(201,168,76,0.7); }
        }

        /* ── Mini result grid ─────────────────────────────────────────────── */
        .result-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 2px;
            padding: 6px;
            border-radius: 8px;
            background: rgba(6,10,18,0.8);
            border: 1px solid rgba(201,168,76,0.15);
        }
        .result-cell {
            aspect-ratio: 1;
            border-radius: 1px;
            background: rgba(15,23,42,0.8);
        }
        .result-cell.rship   { background: rgba(100,116,139,0.7); }
        .result-cell.rhit    { background: rgba(220,38,38,0.85); }
        .result-cell.rmiss   { background: rgba(51,65,85,0.5); position: relative; }
        .result-cell.rmiss::after {
            content: '';
            position: absolute; inset: 30%;
            border-radius: 50%;
            background: rgba(148,163,184,0.6);
        }
        .result-cell.rsunk   { background: rgba(15,23,42,0.9); border: 1px solid rgba(239,68,68,0.3); }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col items-center p-4 select-none">

<div id="touch-ghost"></div>

<!-- ── LOBBY ──────────────────────────────────────────────────────────────── -->
<header class="text-center my-6">
    <h1 style="font-family:'Playfair Display',serif" class="text-4xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-blue-200 via-blue-400 to-blue-600">Naval Warfare</h1>
    <p class="text-slate-500 text-xs mt-2 tracking-[0.3em] uppercase">Strategic Fleet Command</p>
</header>

<div id="lobby-panel" class="w-full max-w-md p-6 rounded-2xl shadow-2xl space-y-6" style="background:rgba(13,21,37,0.9);border:1px solid rgba(201,168,76,0.2);">
    <div class="flex items-center justify-between pb-4" style="border-bottom:1px solid rgba(201,168,76,0.15);">
        <div>
            <h2 class="text-lg font-bold text-slate-200" style="font-family:'Playfair Display',serif">Command Room</h2>
            <p class="text-xs text-slate-500 tracking-widest" id="client-id-tag">Connecting...</p>
        </div>
        <span id="slot-counter" class="px-3 py-1 rounded-full font-bold text-sm" style="background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);color:#c9a84c;">0/2 Players</span>
    </div>
    <div class="p-4 rounded-xl text-xs text-slate-400 tracking-widest" style="background:rgba(6,10,18,0.6);border:1px solid rgba(201,168,76,0.1);">
        <div class="flex justify-between"><span>Session Status</span><span id="session-status-label" class="font-bold" style="color:#c9a84c;">-</span></div>
    </div>
    <button id="btn-join-session" class="w-full font-bold py-3 rounded-xl tracking-widest text-sm uppercase transition-all" style="background:linear-gradient(135deg,#1d4ed8,#3b82f6,#1d4ed8);color:#ffffff;letter-spacing:0.2em;">
        Enter the Arena
    </button>
</div>

<!-- ── GAME WORKSPACE ─────────────────────────────────────────────────────── -->
<div id="game-workspace" class="hidden w-full max-w-5xl flex flex-col items-center">

    <div class="w-full max-w-2xl bg-slate-900 border border-slate-800 px-6 py-3 rounded-2xl mb-6 flex justify-between items-center">
        <div class="font-mono text-xs text-slate-400">Phase: <span id="arena-phase-text" class="text-cyan-400 font-bold uppercase">CONNECTING</span></div>
        <button id="btn-leave-session" class="bg-red-500/10 hover:bg-red-500 text-red-400 hover:text-white border border-red-500/20 text-xs font-bold px-3 py-1.5 rounded-lg transition-all uppercase">Leave</button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full">

        <!-- LEFT: self board -->
        <div class="flex flex-col items-center">
            <h3 class="text-sm font-bold tracking-widest text-slate-400 uppercase mb-3">Your Fleet</h3>

            <div class="relative w-full max-w-sm">
                <div id="self-board" class="grid grid-cols-10 gap-1 bg-slate-900 p-2 rounded-xl border border-slate-800 shadow-inner w-full"></div>
                <div id="ship-overlay"></div>
            </div>

            <div id="placement-action-bar" class="invisible mt-3 flex flex-wrap items-center gap-3 bg-slate-900 border border-slate-800 px-4 py-2 rounded-xl shadow-lg w-full max-w-sm justify-between">
                <span class="text-xs font-mono text-slate-400">Holding: <span id="staging-ship-name" class="text-cyan-400 font-bold">-</span></span>
                <div class="flex gap-2">
                    <button id="btn-rotate" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 px-2.5 py-1.5 rounded-lg text-xs font-bold text-amber-400">🔄 Rotate</button>
                    <button id="btn-auto-place" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 px-2.5 py-1.5 rounded-lg text-xs font-bold text-violet-400">🎲 Auto</button>
                </div>
            </div>

            <div id="drydock-container" class="mt-4 w-full max-w-sm bg-slate-900 border border-slate-800 p-4 rounded-xl">
                <div class="flex items-center justify-between mb-3 border-b border-slate-800 pb-1">
                    <h4 class="text-xs font-mono text-slate-400 uppercase tracking-widest">Drydock Fleet</h4>
                    <button id="btn-auto-place-all" class="text-[10px] font-mono text-violet-400 hover:text-violet-300 border border-violet-500/30 px-2 py-0.5 rounded">🎲 Auto-place all</button>
                </div>
                <div id="drydock-list" class="flex flex-col gap-2"></div>
                <div id="placement-submit-zone" class="mt-4 hidden">
                    <button id="btn-lock-ships" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 text-slate-950 font-black text-xs py-2.5 px-4 rounded-lg tracking-widest uppercase hover:brightness-110 transition-all shadow-md pulse-gold">
                        ⚓ Lock Strategic Deployment
                    </button>
                </div>
            </div>
        </div>

        <!-- RIGHT: opponent board + fleet status -->
        <div class="flex flex-col items-center">
            <h3 class="text-sm font-bold tracking-widest text-slate-400 uppercase mb-3">Target Vector Grid</h3>
            <div id="opponent-board" class="grid grid-cols-10 gap-1 bg-slate-900 p-2 rounded-xl border border-slate-800 w-full max-w-sm shadow-inner opacity-40 pointer-events-none"></div>
            <p id="turn-alert-banner" class="mt-3 text-xs font-mono font-bold tracking-widest text-amber-500 text-center uppercase min-h-[1.5rem]"></p>

            <div id="fleet-status-panel" class="hidden mt-4 w-full max-w-sm grid grid-cols-2 gap-3">
                <div class="bg-slate-900 border border-slate-800 p-3 rounded-xl">
                    <p class="text-[10px] font-mono text-slate-500 uppercase mb-2">Your Ships</p>
                    <div id="my-fleet-status" class="flex flex-col gap-1.5"></div>
                </div>
                <div class="bg-slate-900 border border-slate-800 p-3 rounded-xl">
                    <p class="text-[10px] font-mono text-slate-500 uppercase mb-2">Enemy Ships</p>
                    <div id="enemy-fleet-status" class="flex flex-col gap-1.5"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ── END GAME OVERLAY ───────────────────────────────────────────────────── -->
<div id="endgame-overlay" style="display:none;">
    <div class="w-full max-w-2xl mx-auto space-y-6">

        <!-- Result header -->
        <div class="text-center space-y-2">
            <div id="endgame-icon" class="text-7xl">🏆</div>
            <h2 id="endgame-title" class="text-4xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-yellow-200 via-amber-400 to-yellow-600" style="font-family:'Playfair Display',serif;">VICTORY</h2>
            <p id="endgame-subtitle" class="text-slate-400 text-sm tracking-widest"></p>
        </div>

        <!-- Board reveal section -->
        <div id="endgame-boards" class="grid grid-cols-1 sm:grid-cols-2 gap-4">

            <!-- My board summary -->
            <div class="rounded-xl p-4 space-y-2" style="background:rgba(13,21,37,0.9);border:1px solid rgba(201,168,76,0.15);">
                <p class="text-xs font-mono text-slate-400 uppercase tracking-widest text-center">Your Fleet</p>
                <div id="result-my-grid" class="result-grid"></div>
                <p id="result-my-stats" class="text-[10px] text-slate-500 text-center font-mono"></p>
            </div>

            <!-- Enemy board reveal -->
            <div class="rounded-xl p-4 space-y-2" style="background:rgba(13,21,37,0.9);border:1px solid rgba(201,168,76,0.15);">
                <p class="text-xs font-mono text-slate-400 uppercase tracking-widest text-center">Enemy Fleet — Revealed</p>
                <div id="result-enemy-grid" class="result-grid"></div>
                <p id="result-enemy-stats" class="text-[10px] text-slate-500 text-center font-mono"></p>
            </div>
        </div>

        <!-- Action buttons -->
        <div class="flex flex-col sm:flex-row gap-3">
            <button id="btn-rematch" class="flex-1 font-bold py-3 rounded-xl tracking-widest text-sm uppercase transition-all" style="background:linear-gradient(135deg,#1d4ed8,#3b82f6,#1d4ed8);color:#ffffff;">
                ⚔️ Play Again
            </button>
            <button id="btn-main-menu" class="flex-1 font-bold py-2.5 rounded-xl text-sm uppercase transition-all text-slate-300 hover:text-white" style="background:rgba(255,255,255,0.05);border:1px solid rgba(201,168,76,0.2);">
                ← Main Menu
            </button>
        </div>
    </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════════════════════
let ws;
let myUserId     = null;
let isMyTurn     = false;
let isGameActive = false;
let shotCount    = 0;
let myHitCount   = 0;
let myMissCount  = 0;

// Snapshot of where my shots landed: { hit: [[x,y]...], miss: [[x,y]...] }
let myShotHistory = { hit: [], miss: [] };
// Enemy board as revealed to us (filled in GAME_OVER)
let revealedEnemyCells = [];

let enemyHitBoard = Array(10).fill(null).map(() => Array(10).fill(false));

const FLEET_TEMPLATE = () => [
    { id: 'carrier',    name: 'Carrier',     size: 5, x: null, y: null, orientation: 'H', placed: false, hits: 0 },
    { id: 'battleship', name: 'Battleship',  size: 4, x: null, y: null, orientation: 'H', placed: false, hits: 0 },
    { id: 'destroyer',  name: 'Destroyer',   size: 3, x: null, y: null, orientation: 'H', placed: false, hits: 0 },
    { id: 'submarine',  name: 'Submarine',   size: 3, x: null, y: null, orientation: 'H', placed: false, hits: 0 },
    { id: 'patrol',     name: 'Patrol Boat', size: 2, x: null, y: null, orientation: 'H', placed: false, hits: 0 },
];
let fleetInventory = FLEET_TEMPLATE();

const ENEMY_SIZES = [5, 4, 3, 3, 2];
let enemyFleetStatus = ENEMY_SIZES.map((s, i) => ({ id: `e${i}`, size: s, sunk: false, hitsLanded: 0 }));

let selectedShip = null;
let hoverCell    = null;
let isDragging   = false;
let cellSize     = 0;
let gridOriginX  = 0;
let gridOriginY  = 0;

// ════════════════════════════════════════════════════════════════════════════
//  AUDIO
// ════════════════════════════════════════════════════════════════════════════
let audioCtx = null;
function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
}

function playHit() {
    try {
        const ctx = getAudioCtx(), t = ctx.currentTime;
        const thud = ctx.createOscillator(), thudGain = ctx.createGain();
        thud.type = 'sine';
        thud.frequency.setValueAtTime(180, t);
        thud.frequency.exponentialRampToValueAtTime(55, t + 0.18);
        thudGain.gain.setValueAtTime(1.0, t);
        thudGain.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
        thud.connect(thudGain); thudGain.connect(ctx.destination);
        thud.start(t); thud.stop(t + 0.22);

        const crunch = ctx.createOscillator(), crunchGain = ctx.createGain();
        crunch.type = 'square';
        crunch.frequency.setValueAtTime(90, t);
        crunch.frequency.exponentialRampToValueAtTime(30, t + 0.15);
        crunchGain.gain.setValueAtTime(0.35, t);
        crunchGain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
        const cf = ctx.createBiquadFilter(); cf.type = 'lowpass'; cf.frequency.value = 400;
        crunch.connect(cf); cf.connect(crunchGain); crunchGain.connect(ctx.destination);
        crunch.start(t); crunch.stop(t + 0.2);

        const crack = ctx.createOscillator(), crackGain = ctx.createGain();
        crack.type = 'sawtooth';
        crack.frequency.setValueAtTime(800, t);
        crack.frequency.exponentialRampToValueAtTime(100, t + 0.05);
        crackGain.gain.setValueAtTime(0.5, t);
        crackGain.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
        crack.connect(crackGain); crackGain.connect(ctx.destination);
        crack.start(t); crack.stop(t + 0.06);

        const bufLen = Math.floor(ctx.sampleRate * 0.25);
        const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufLen, 2.5);
        const noise = ctx.createBufferSource(), noiseGain = ctx.createGain();
        const nf = ctx.createBiquadFilter(); nf.type = 'bandpass'; nf.frequency.value = 1200; nf.Q.value = 0.8;
        noise.buffer = buf; noiseGain.gain.setValueAtTime(0.4, t);
        noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
        noise.connect(nf); nf.connect(noiseGain); noiseGain.connect(ctx.destination);
        noise.start(t);
    } catch(e) {}
}

function playMiss() {
    try {
        const ctx = getAudioCtx(), t = ctx.currentTime;
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, t);
        osc.frequency.exponentialRampToValueAtTime(200, t + 0.25);
        gain.gain.setValueAtTime(0.15, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(t); osc.stop(t + 0.3);
    } catch(e) {}
}

function playSink() {
    try {
        const ctx = getAudioCtx(), t = ctx.currentTime;
        [100, 70, 45].forEach((freq, i) => {
            const osc = ctx.createOscillator(), gain = ctx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(freq, t + i * 0.1);
            osc.frequency.exponentialRampToValueAtTime(freq * 0.4, t + i * 0.1 + 0.5);
            gain.gain.setValueAtTime(0.6, t + i * 0.1);
            gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.6);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(t + i * 0.1); osc.stop(t + i * 0.1 + 0.65);
        });
        const bufLen = Math.floor(ctx.sampleRate * 0.8);
        const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufLen, 1.5);
        const src = ctx.createBufferSource(), g = ctx.createGain();
        const f = ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 300;
        src.buffer = buf; g.gain.value = 0.3;
        src.connect(f); f.connect(g); g.connect(ctx.destination); src.start(t);
    } catch(e) {}
}

function playShipSunkChime() {
    try {
        const ctx = getAudioCtx(), t = ctx.currentTime;
        [330, 415, 494, 659].forEach((freq, i) => {
            const osc = ctx.createOscillator(), gain = ctx.createGain();
            osc.type = 'square'; osc.frequency.value = freq;
            gain.gain.setValueAtTime(0, t + i * 0.07);
            gain.gain.linearRampToValueAtTime(0.18, t + i * 0.07 + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.07 + 0.18);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(t + i * 0.07); osc.stop(t + i * 0.07 + 0.2);
        });
    } catch(e) {}
}

function playPlace() {
    try {
        const ctx = getAudioCtx(), t = ctx.currentTime;
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(440, t);
        osc.frequency.exponentialRampToValueAtTime(660, t + 0.1);
        gain.gain.setValueAtTime(0.1, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(t); osc.stop(t + 0.15);
    } catch(e) {}
}

function initSocketEngine() {
    const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${protocol}://${window.location.host}`);
    ws.onmessage = (e) => handleServerMatrixMessage(JSON.parse(e.data));
    ws.onclose   = () => setTimeout(initSocketEngine, 2000);
}
initSocketEngine();

//  GRID CONSTRUCTION
// ════════════════════════════════════════════════════════════════════════════
function buildDomMatrices() {
    const selfBoard = document.getElementById('self-board');
    const oppBoard  = document.getElementById('opponent-board');
    selfBoard.innerHTML = ''; oppBoard.innerHTML = '';

    for (let y = 0; y < 10; y++) {
        for (let x = 0; x < 10; x++) {
            const selfCell = document.createElement('div');
            selfCell.className = 'grid-cell bg-slate-950 rounded-sm border border-slate-800/40';
            selfCell.dataset.x = x; selfCell.dataset.y = y;
            selfCell.addEventListener('mouseenter', () => onCellEnter(x, y));
            selfCell.addEventListener('mousedown',  (e) => { e.preventDefault(); onCellMouseDown(x, y); });
            selfCell.addEventListener('mouseup',    () => onCellMouseUp(x, y));
            selfBoard.appendChild(selfCell);

            const oppCell = document.createElement('div');
            oppCell.className = 'grid-cell bg-slate-950 border border-slate-800/40 rounded-sm cursor-crosshair';
            oppCell.dataset.x = x; oppCell.dataset.y = y;
            oppCell.addEventListener('click', () => dispatchFireOrder(x, y));
            oppBoard.appendChild(oppCell);
        }
    }

    selfBoard.addEventListener('mouseleave', () => { hoverCell = null; refreshSelfBoardGridDisplay(); });
    document.addEventListener('mouseup', () => { isDragging = false; });
    selfBoard.addEventListener('touchstart', onTouchStart, { passive: false });
    selfBoard.addEventListener('touchmove',  onTouchMove,  { passive: false });
    selfBoard.addEventListener('touchend',   onTouchEnd,   { passive: false });

    renderDrydockList();
    rebuildShipOverlay();
    cacheGridGeometry();
}

function cacheGridGeometry() {
    const selfBoard = document.getElementById('self-board');
    if (!selfBoard) return;
    const rect = selfBoard.getBoundingClientRect();
    const firstCell = selfBoard.querySelector('.grid-cell');
    if (!firstCell) return;
    const cellRect = firstCell.getBoundingClientRect();
    cellSize    = cellRect.width + 1;
    gridOriginX = rect.left + 8;
    gridOriginY = rect.top  + 8;
}

//  SHIP SPRITE OVERLAY
// ════════════════════════════════════════════════════════════════════════════
function rebuildShipOverlay() {
    const overlay = document.getElementById('ship-overlay');
    overlay.innerHTML = '';
    cacheGridGeometry();
    fleetInventory.forEach(ship => {
        if (!ship.placed) return;
        const sprite = document.createElement('div');
        sprite.className = 'ship-sprite';
        sprite.dataset.shipId = ship.id;
        positionSprite(sprite, ship.x, ship.y, ship.orientation, ship.size);
        overlay.appendChild(sprite);
    });
}

function positionSprite(sprite, gx, gy, ori, size) {
    const selfBoard = document.getElementById('self-board');
    const boardRect = selfBoard.getBoundingClientRect();
    const firstCell = selfBoard.querySelector(`[data-x="${gx}"][data-y="${gy}"]`);
    const lastX = ori === 'H' ? gx + size - 1 : gx;
    const lastY = ori === 'V' ? gy + size - 1 : gy;
    const lastCell = selfBoard.querySelector(`[data-x="${lastX}"][data-y="${lastY}"]`);
    if (!firstCell || !lastCell) return;

    const first = firstCell.getBoundingClientRect();
    const last  = lastCell.getBoundingClientRect();
    const w = last.right  - first.left;
    const h = last.bottom - first.top;

    const offsets = {
        carrier:    { H: [0, -4],  V: [-4, 0] },
        battleship: { H: [5, -5],  V: [-4, 0] },
        destroyer:  { H: [-2, -5], V: [-9, -4] },
        submarine:  { H: [1, -8],  V: [-4, 0] },
        patrol:     { H: [-5, -7], V: [-6, -2] },
    };
    const [ox, oy] = offsets[sprite.dataset.shipId]?.[ori] ?? [0, 0];

    sprite.style.left = (first.left - boardRect.left + ox) + 'px';
    sprite.style.top  = (first.top  - boardRect.top  + oy) + 'px';

    if (ori === 'V') {
        sprite.style.width           = h + 'px';
        sprite.style.height          = w + 'px';
        sprite.style.transformOrigin = '0 0';
        sprite.style.transform       = 'rotate(90deg) translateY(-100%)';
    } else {
        sprite.style.width           = w + 'px';
        sprite.style.height          = h + 'px';
        sprite.style.transformOrigin = '';
        sprite.style.transform       = '';
    }
}

function updateOrAddSprite(ship) {
    const overlay = document.getElementById('ship-overlay');
    let sprite = overlay.querySelector(`[data-ship-id="${ship.id}"]`);
    if (!sprite) {
        sprite = document.createElement('div');
        sprite.className = 'ship-sprite';
        sprite.dataset.shipId = ship.id;
        overlay.appendChild(sprite);
    }
    positionSprite(sprite, ship.x, ship.y, ship.orientation, ship.size);
}

function removeSprite(shipId) {
    const el = document.getElementById('ship-overlay').querySelector(`[data-ship-id="${shipId}"]`);
    if (el) el.remove();
}

function sinkSpriteAndCells(ship) {
    const el = document.getElementById('ship-overlay').querySelector(`[data-ship-id="${ship.id}"]`);
    if (el) el.classList.add('sinking');
    const selfBoard = document.getElementById('self-board');
    for (let i = 0; i < ship.size; i++) {
        const nx = ship.x + (ship.orientation === 'H' ? i : 0);
        const ny = ship.y + (ship.orientation === 'V' ? i : 0);
        const cell = selfBoard.querySelector(`[data-x="${nx}"][data-y="${ny}"]`);
        if (cell) cell.classList.add('cell-sinking');
    }
}

// ════════════════════════════════════════════════════════════════════════════
//  MOUSE EVENTS
// ════════════════════════════════════════════════════════════════════════════
function onCellEnter(x, y) {
    hoverCell = { x, y };
    if (selectedShip) refreshSelfBoardGridDisplay();
}
function onCellMouseDown(x, y) {
    if (isGameActive) return;
    if (!selectedShip) {
        const shipOnCell = fleetInventory.find(s => s.placed && isShipAtCoordinate(s, x, y));
        if (shipOnCell) { pickUpShip(shipOnCell); return; }
    }
    isDragging = true;
}
function onCellMouseUp(x, y) {
    if (!isDragging || !selectedShip) return;
    isDragging = false;
    tryPlaceShip(x, y);
}

// ════════════════════════════════════════════════════════════════════════════
//  TOUCH EVENTS
// ════════════════════════════════════════════════════════════════════════════
function cellFromTouch(touch) {
    cacheGridGeometry();
    const x = Math.floor((touch.clientX - gridOriginX) / cellSize);
    const y = Math.floor((touch.clientY - gridOriginY) / cellSize);
    if (x < 0 || x >= 10 || y < 0 || y >= 10) return null;
    return { x, y };
}
function onTouchStart(e) {
    if (isGameActive) return;
    e.preventDefault();
    const touch = e.touches[0];
    const cell = cellFromTouch(touch);
    if (!cell) return;
    if (!selectedShip) {
        const shipOnCell = fleetInventory.find(s => s.placed && isShipAtCoordinate(s, cell.x, cell.y));
        if (shipOnCell) { pickUpShip(shipOnCell); showTouchGhost(touch, shipOnCell); return; }
    }
    if (selectedShip) { hoverCell = cell; refreshSelfBoardGridDisplay(); showTouchGhost(touch, selectedShip); }
}
function onTouchMove(e) {
    if (!selectedShip) return;
    e.preventDefault();
    const touch = e.touches[0];
    const cell = cellFromTouch(touch);
    moveTouchGhost(touch, selectedShip);
    if (cell && (cell.x !== hoverCell?.x || cell.y !== hoverCell?.y)) { hoverCell = cell; refreshSelfBoardGridDisplay(); }
}
function onTouchEnd(e) {
    hideTouchGhost();
    if (!selectedShip || !hoverCell) return;
    tryPlaceShip(hoverCell.x, hoverCell.y);
}
function showTouchGhost(touch, ship) {
    const ghost = document.getElementById('touch-ghost');
    cacheGridGeometry();
    const imgMap = { carrier:'battleship1.png', battleship:'battleship3.png', destroyer:'battleship2.png', submarine:'battleship4.png', patrol:'battleship5.png' };
    ghost.style.backgroundImage = `url('${imgMap[ship.id] || 'battleship1.png'}')`;
    ghost.style.width = (cellSize * ship.size) + 'px';
    ghost.style.height = cellSize + 'px';
    ghost.style.display = 'block';
    moveTouchGhost(touch, ship);
}
function moveTouchGhost(touch, ship) {
    const ghost = document.getElementById('touch-ghost');
    cacheGridGeometry();
    const w = cellSize * ship.size, h = cellSize;
    ghost.style.transform = ship.orientation === 'V' ? 'rotate(90deg)' : '';
    ghost.style.left = (touch.clientX - w / 2) + 'px';
    ghost.style.top  = (touch.clientY - h / 2) + 'px';
}
function hideTouchGhost() { document.getElementById('touch-ghost').style.display = 'none'; }

// ════════════════════════════════════════════════════════════════════════════
//  PLACEMENT
// ════════════════════════════════════════════════════════════════════════════
function pickUpShip(ship) {
    ship.placed = false;
    selectedShip = ship;
    hoverCell = { x: ship.x ?? 0, y: ship.y ?? 0 };
    removeSprite(ship.id);
    document.getElementById('staging-ship-name').innerText = ship.name;
    document.getElementById('placement-action-bar').classList.remove('invisible');
    renderDrydockList(); refreshSelfBoardGridDisplay();
}

function tryPlaceShip(x, y) {
    if (!selectedShip) return;
    const ori = selectedShip.orientation;
    for (let i = 0; i < selectedShip.size; i++) {
        const nx = x + (ori === 'H' ? i : 0);
        const ny = y + (ori === 'V' ? i : 0);
        if (nx < 0 || nx >= 10 || ny < 0 || ny >= 10) { flashInvalid(x, y); return; }
        if (fleetInventory.some(s => s.placed && s.id !== selectedShip.id && isShipAtCoordinate(s, nx, ny))) { flashInvalid(x, y); return; }
    }
    selectedShip.x = x; selectedShip.y = y; selectedShip.placed = true;
    playPlace();
    updateOrAddSprite(selectedShip);
    selectedShip = null; hoverCell = null;
    document.getElementById('placement-action-bar').classList.add('invisible');
    renderDrydockList(); refreshSelfBoardGridDisplay();
}

function flashInvalid(x, y) {
    const selfGrid = document.getElementById('self-board');
    const ori = selectedShip.orientation;
    for (let i = 0; i < selectedShip.size; i++) {
        const nx = x + (ori === 'H' ? i : 0);
        const ny = y + (ori === 'V' ? i : 0);
        if (nx < 0 || nx >= 10 || ny < 0 || ny >= 10) continue;
        const c = selfGrid.querySelector(`[data-x="${nx}"][data-y="${ny}"]`);
        if (c) { c.classList.add('bg-red-800'); setTimeout(() => refreshSelfBoardGridDisplay(), 350); }
    }
}

// ════════════════════════════════════════════════════════════════════════════
//  AUTO-PLACE
// ════════════════════════════════════════════════════════════════════════════
function autoPlaceAll() {
    fleetInventory.forEach(s => { s.placed = false; s.x = null; s.y = null; });
    selectedShip = null;
    for (const ship of fleetInventory) {
        let placed = false, tries = 0;
        while (!placed && tries++ < 1000) {
            const ori = Math.random() < 0.5 ? 'H' : 'V';
            const rx = Math.floor(Math.random() * (ori === 'H' ? 11 - ship.size : 10));
            const ry = Math.floor(Math.random() * (ori === 'V' ? 11 - ship.size : 10));
            let ok = true;
            for (let i = 0; i < ship.size; i++) {
                const nx = rx + (ori === 'H' ? i : 0);
                const ny = ry + (ori === 'V' ? i : 0);
                if (fleetInventory.some(s => s.placed && s.id !== ship.id && isShipAtCoordinate(s, nx, ny))) { ok = false; break; }
            }
            if (ok) { ship.x = rx; ship.y = ry; ship.orientation = ori; ship.placed = true; placed = true; }
        }
    }
    document.getElementById('placement-action-bar').classList.add('invisible');
    renderDrydockList(); refreshSelfBoardGridDisplay(); rebuildShipOverlay();
}

// ════════════════════════════════════════════════════════════════════════════
//  DRYDOCK
// ════════════════════════════════════════════════════════════════════════════
function renderDrydockList() {
    const listContainer = document.getElementById('drydock-list');
    listContainer.innerHTML = '';
    fleetInventory.forEach(ship => {
        const isSel = selectedShip?.id === ship.id;
        const row = document.createElement('div');
        row.className = `ship-dock-item flex items-center justify-between border border-slate-800 bg-slate-950/40 p-2 rounded-lg text-xs font-mono cursor-pointer
            ${ship.placed ? 'placed' : ''} ${isSel ? 'selected ring-1 ring-cyan-400' : ''}`;
        const blocks = Array.from({ length: ship.size }, (_, i) => {
            const hc = (ship.hits > i) ? 'bg-red-500' : (isSel ? 'bg-cyan-400' : ship.placed ? 'bg-slate-600' : 'bg-slate-500');
            return `<span class="inline-block w-3.5 h-3.5 rounded-sm ${hc} border border-slate-400/20"></span>`;
        }).join('');
        row.innerHTML = `
            <div class="flex flex-col gap-0.5">
                <span class="font-bold text-slate-300">${ship.name} <span class="text-slate-500">(${ship.size})</span></span>
                <div class="flex gap-0.5 mt-0.5">${blocks}</div>
            </div>
            <span class="text-[10px] ${ship.placed ? 'text-emerald-400' : isSel ? 'text-cyan-300 animate-pulse' : 'text-slate-500'}">
                ${ship.placed ? `✓ ${ship.orientation}` : isSel ? '⬡ HELD' : '○ DOCK'}
            </span>`;
        row.addEventListener('click', () => {
            if (isGameActive) return;
            if (isSel) {
                selectedShip = null;
                document.getElementById('placement-action-bar').classList.add('invisible');
                renderDrydockList(); refreshSelfBoardGridDisplay(); return;
            }
            if (ship.placed) { ship.placed = false; removeSprite(ship.id); }
            selectedShip = ship;
            hoverCell = ship.x !== null ? { x: ship.x, y: ship.y } : { x: 0, y: 0 };
            document.getElementById('staging-ship-name').innerText = ship.name;
            document.getElementById('placement-action-bar').classList.remove('invisible');
            renderDrydockList(); refreshSelfBoardGridDisplay();
        });
        listContainer.appendChild(row);
    });
    document.getElementById('placement-submit-zone').classList.toggle('hidden', !fleetInventory.every(s => s.placed));
}

// ════════════════════════════════════════════════════════════════════════════
//  BOARD DISPLAY
// ════════════════════════════════════════════════════════════════════════════
function refreshSelfBoardGridDisplay() {
    const selfGrid = document.getElementById('self-board');
    const hasShip  = !!selectedShip;
    selfGrid.querySelectorAll('.grid-cell').forEach(c => {
        if (c.dataset.state) return;
        c.className = `grid-cell bg-slate-950 rounded-sm border border-slate-800/40 ${hasShip ? 'cursor-crosshair' : 'cursor-default'}`;
    });
    if (selectedShip && hoverCell) {
        const { x, y } = hoverCell;
        const ori = selectedShip.orientation;
        let allValid = true;
        for (let i = 0; i < selectedShip.size; i++) {
            const nx = x + (ori === 'H' ? i : 0);
            const ny = y + (ori === 'V' ? i : 0);
            if (nx < 0 || nx >= 10 || ny < 0 || ny >= 10) { allValid = false; break; }
            if (fleetInventory.some(s => s.placed && s.id !== selectedShip.id && isShipAtCoordinate(s, nx, ny))) { allValid = false; break; }
        }
        for (let i = 0; i < selectedShip.size; i++) {
            const nx = x + (ori === 'H' ? i : 0);
            const ny = y + (ori === 'V' ? i : 0);
            if (nx < 0 || nx >= 10 || ny < 0 || ny >= 10) continue;
            const c = selfGrid.querySelector(`[data-x="${nx}"][data-y="${ny}"]`);
            if (c && !c.dataset.state) c.className = `grid-cell rounded-sm ${allValid
                ? 'bg-cyan-900 border border-cyan-400 shadow-[0_0_5px_rgba(34,211,238,0.5)]'
                : 'bg-red-950 border border-red-500'}`;
        }
    }
}

function updateMyShipHit(x, y) {
    const ship = fleetInventory.find(s => s.placed && isShipAtCoordinate(s, x, y));
    if (!ship) return;
    ship.hits++;
    for (let i = 0; i < ship.hits && i < ship.size; i++) {
        const pip = document.getElementById(`mypip-${ship.id}-${i}`);
        if (pip) pip.classList.add(ship.hits >= ship.size ? 'sunk' : 'hit');
    }
    if (ship.hits >= ship.size) {
        for (let i = 0; i < ship.size; i++) {
            const pip = document.getElementById(`mypip-${ship.id}-${i}`);
            if (pip) { pip.classList.remove('hit'); pip.classList.add('sunk'); }
        }
        sinkSpriteAndCells(ship);
        playSink(); playShipSunkChime();
    }
}

function updateEnemyHit(x, y) {
    enemyHitBoard[y][x] = true;
    let bestLen = 0;
    let x0 = x; while (x0 > 0 && enemyHitBoard[y][x0-1]) x0--;
    let x1 = x; while (x1 < 9 && enemyHitBoard[y][x1+1]) x1++;
    if (x1 - x0 + 1 > bestLen) bestLen = x1 - x0 + 1;
    let y0 = y; while (y0 > 0 && enemyHitBoard[y0-1][x]) y0--;
    let y1 = y; while (y1 < 9 && enemyHitBoard[y1+1][x]) y1++;
    if (y1 - y0 + 1 > bestLen) bestLen = y1 - y0 + 1;

    const candidate = enemyFleetStatus.find(ef => !ef.sunk && ef.size === bestLen);
    if (candidate) {
        const idx = enemyFleetStatus.indexOf(candidate);
        candidate.hitsLanded++;
        const pip = document.getElementById(`epip-${idx}-${candidate.hitsLanded - 1}`);
        if (pip) pip.classList.add(candidate.hitsLanded >= candidate.size ? 'sunk' : 'hit');
        if (candidate.hitsLanded >= candidate.size) {
            candidate.sunk = true;
            for (let i = 0; i < candidate.size; i++) {
                const p = document.getElementById(`epip-${idx}-${i}`);
                if (p) { p.classList.remove('hit'); p.classList.add('sunk'); }
            }
            playSink(); playShipSunkChime();
        }
    }
}

// ════════════════════════════════════════════════════════════════════════════
//  FIRE FX
// ════════════════════════════════════════════════════════════════════════════
function applyFireResult(board, x, y, hit) {
    const cell = board.querySelector(`[data-x="${x}"][data-y="${y}"]`);
    if (!cell) return;
    cell.dataset.state = hit ? 'hit' : 'miss';
    cell.style.position = 'relative';
    cell.className = `grid-cell rounded-sm ${hit ? 'bg-red-900 border border-red-500' : 'bg-slate-900 border border-slate-700'}`;
    const fx = document.createElement('div');
    fx.className = hit ? 'hit-fx' : 'miss-fx';
    fx.textContent = hit ? '💥' : '💧';
    cell.appendChild(fx);
    setTimeout(() => fx.remove(), 600);
    if (hit) playHit(); else playMiss();
}

//  END GAME SCREEN
// ════════════════════════════════════════════════════════════════════════════
function buildResultGrid(containerId, shipCells, hitCells, missCells) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';

    // Build lookup sets
    const shipSet = new Set(shipCells.map(c => `${c.x},${c.y}`));
    const hitSet  = new Set(hitCells.map(c  => `${c.x},${c.y}`));
    const missSet = new Set(missCells.map(c => `${c.x},${c.y}`));

    for (let y = 0; y < 10; y++) {
        for (let x = 0; x < 10; x++) {
            const key = `${x},${y}`;
            const cell = document.createElement('div');
            cell.className = 'result-cell';
            const isShip = shipSet.has(key);
            const isHit  = hitSet.has(key);
            const isMiss = missSet.has(key);

            if (isShip && isHit) cell.classList.add('rhit');
            else if (isShip)     cell.classList.add('rship');
            else if (isHit)      cell.classList.add('rhit');
            else if (isMiss)     cell.classList.add('rmiss');

            container.appendChild(cell);
        }
    }
}

function showEndGameScreen(won, opponentShipCells) {
    // My board: ships = fleetInventory positions, hits on me = cells with dataset.state=hit on self-board
    const selfBoard = document.getElementById('self-board');
    const myShipCells = [];
    fleetInventory.forEach(ship => {
        if (!ship.placed) return;
        for (let i = 0; i < ship.size; i++) {
            myShipCells.push({
                x: ship.x + (ship.orientation === 'H' ? i : 0),
                y: ship.y + (ship.orientation === 'V' ? i : 0)
            });
        }
    });

    const myHitCells  = [];
    const myMissCells = [];
    selfBoard.querySelectorAll('[data-state="hit"]').forEach(c  => myHitCells.push({ x: +c.dataset.x, y: +c.dataset.y }));
    selfBoard.querySelectorAll('[data-state="miss"]').forEach(c => myMissCells.push({ x: +c.dataset.x, y: +c.dataset.y }));

    // Enemy board: ships = opponentShipCells, my shots on enemy board
    const oppBoard = document.getElementById('opponent-board');
    const enemyHitCells  = [];
    const enemyMissCells = [];
    oppBoard.querySelectorAll('[data-state="hit"]').forEach(c  => enemyHitCells.push({ x: +c.dataset.x, y: +c.dataset.y }));
    oppBoard.querySelectorAll('[data-state="miss"]').forEach(c => enemyMissCells.push({ x: +c.dataset.x, y: +c.dataset.y }));

    // Build mini grids
    buildResultGrid('result-my-grid',    myShipCells,        myHitCells,    myMissCells);
    buildResultGrid('result-enemy-grid', opponentShipCells,  enemyHitCells, enemyMissCells);

    // Stats
    const myAcc = myHitCells.length + myMissCells.length > 0
        ? Math.round(myHitCells.length / (myHitCells.length + myMissCells.length) * 100) : 0;
    const enemyAcc = enemyHitCells.length + enemyMissCells.length > 0
        ? Math.round(enemyHitCells.length / (enemyHitCells.length + enemyMissCells.length) * 100) : 0;

    document.getElementById('result-my-stats').textContent =
        `${myHitCells.length} hits taken · ${myMissCells.length} misses on you`;
    document.getElementById('result-enemy-stats').textContent =
        `Your accuracy: ${enemyAcc}% · ${enemyHitCells.length} hits landed`;

    // Header
    document.getElementById('endgame-icon').textContent    = won ? '🏆' : '💀';
    document.getElementById('endgame-title').textContent   = won ? 'VICTORY' : 'DEFEATED';
    document.getElementById('endgame-subtitle').textContent =
        `${won ? 'Enemy fleet annihilated' : 'Your fleet was destroyed'} · ${shotCount} salvos fired · Accuracy ${won ? enemyAcc : myAcc}%`;

    document.getElementById('endgame-overlay').style.display = 'flex';

    // Animate enemy reveal cells one by one
    const enemyCells = document.getElementById('result-enemy-grid').querySelectorAll('.rship');
    enemyCells.forEach((c, i) => {
        setTimeout(() => c.classList.add('cell-revealed'), 100 + i * 30);
    });
}

// ════════════════════════════════════════════════════════════════════════════
//  SERVER MESSAGES
// ════════════════════════════════════════════════════════════════════════════
function handleServerMatrixMessage(packet) {
    const { type, payload, message } = packet;
    if (type === 'ERROR') return console.warn('Server error:', message);

    if (type === 'INIT_CLIENT') {
        myUserId = payload.userId;
        document.getElementById('client-id-tag').innerText = `ID: SYS-${myUserId.substring(0, 8).toUpperCase()}`;
    }
    if (type === 'SESSION_STATUS_UPDATE') {
        document.getElementById('slot-counter').innerText = `${payload.playerCount}/2 PLAYERS`;
        document.getElementById('session-status-label').innerText = payload.status;
    }
    if (type === 'JOIN_SUCCESS') {
        document.getElementById('lobby-panel').classList.add('hidden');
        document.getElementById('game-workspace').classList.remove('hidden');
        fleetInventory = FLEET_TEMPLATE();
        enemyFleetStatus = ENEMY_SIZES.map((s, i) => ({ id: `e${i}`, size: s, sunk: false, hitsLanded: 0 }));
        enemyHitBoard = Array(10).fill(null).map(() => Array(10).fill(false));
        myShotHistory = { hit: [], miss: [] };
        shotCount = 0;
        buildDomMatrices();
        enableFramePulse();
    }
    if (type === 'PLACEMENT_CONFIRMED') {
        disableFramePulse();
        document.getElementById('drydock-container').innerHTML =
            `<div class="text-center py-4 text-emerald-400 font-mono text-sm animate-pulse">■ AWAITING OPPONENT DEPLOYMENT...</div>`;
    }
    if (type === 'TURN_UPDATE') {
        isMyTurn = payload.isYourTurn;
        isGameActive = true;
        disableFramePulse();
        document.getElementById('placement-action-bar').classList.add('hidden');
        document.getElementById('arena-phase-text').innerText = 'BATTLE';
        buildFleetStatusPanels();
        const oppGrid = document.getElementById('opponent-board');
        oppGrid.classList.toggle('pointer-events-none', !isMyTurn);
        oppGrid.classList.toggle('opacity-40', !isMyTurn);
        document.getElementById('turn-alert-banner').innerText = isMyTurn
            ? '» YOUR TURN — FIRE «' : 'STANDBY — INCOMING SALVO...';
    }
    if (type === 'FIRE_RESULT') {
        shotCount++;
        const isMine = payload.target === 'opponent';
        const board  = document.getElementById(isMine ? 'opponent-board' : 'self-board');
        applyFireResult(board, payload.x, payload.y, payload.hit);
        if (!isMine && payload.hit) updateMyShipHit(payload.x, payload.y);
        if (isMine  && payload.hit) updateEnemyHit(payload.x, payload.y);
    }
    if (type === 'GAME_OVER') {
        if (!isGameActive) return;
        const won = payload.winner === myUserId;
        isGameActive = false;

        // Brief pause so the last shot FX plays out, then show results
        setTimeout(() => {
            showEndGameScreen(won, payload.opponentShipCells || []);
        }, 1200);
    }
    if (type === 'SESSION_RESET') {
        document.getElementById('endgame-overlay').style.display = 'none';
        window.location.reload();
    }
    if (type === 'OPPONENT_TEMPORARILY_OFFLINE') {
        document.getElementById('turn-alert-banner').innerText = '⚠ OPPONENT DISCONNECTED — 60s WINDOW';
    }
}

function dispatchFireOrder(x, y) {
    if (!isMyTurn || !isGameActive) return;
    const cell = document.getElementById('opponent-board').querySelector(`[data-x="${x}"][data-y="${y}"]`);
    if (cell?.dataset.state) return;
    ws.send(JSON.stringify({ type: 'FIRE_SHOT', payload: { x, y } }));
}

document.getElementById('btn-auto-place').addEventListener('click', () => {
    if (!selectedShip) return;
    const ship = selectedShip;
    let placed = false, tries = 0;
    while (!placed && tries++ < 500) {
        const ori = Math.random() < 0.5 ? 'H' : 'V';
        const rx = Math.floor(Math.random() * (ori === 'H' ? 11 - ship.size : 10));
        const ry = Math.floor(Math.random() * (ori === 'V' ? 11 - ship.size : 10));
        let ok = true;
        for (let i = 0; i < ship.size; i++) {
            const nx = rx + (ori === 'H' ? i : 0);
            const ny = ry + (ori === 'V' ? i : 0);
            if (fleetInventory.some(s => s.placed && s.id !== ship.id && isShipAtCoordinate(s, nx, ny))) { ok = false; break; }
        }
        if (ok) {
            ship.orientation = ori; ship.x = rx; ship.y = ry; ship.placed = true;
            selectedShip = null;
            document.getElementById('placement-action-bar').classList.add('invisible');
            updateOrAddSprite(ship); playPlace(); placed = true;
        }
    }
    renderDrydockList(); refreshSelfBoardGridDisplay();
});

    function hexToRgba(hex) {
        const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
        return `rgba(${r},${g},${b},1)`;
    }
    function cssColorToHex(val) {
        // Parse rgba or rgb to hex for color input
        const m = val.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
        if (m) return '#' + [m[1],m[2],m[3]].map(n => parseInt(n).toString(16).padStart(2,'0')).join('');
        if (val.startsWith('#')) return val.substring(0,7);
        return '#000000';
    }
    function cssColorAlpha(val) {
        const m = val.match(/rgba?\(\d+,\s*\d+,\s*\d+,?\s*([\d.]+)?/);

    function applyPreset(preset) {
        Object.entries(preset).forEach(([k, v]) => document.documentElement.style.setProperty(k, v));
        saveTheme();

    }

        scrollArea.innerHTML = '';

            const row = document.createElement('div');
            Object.assign(row.style, {
                display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                padding: '4px 0', gap: '8px',
            });

            const label = document.createElement('span');
            label.textContent = token.label;
            Object.assign(label.style, { fontSize: '10px', color: '#94a3b8', flex: '1', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' });

                    fontSize: '9px', background: '#0d1525', color: '#c9a84c',

                    if (getVar(token.key).includes(opt.value.replace(/'/g,'').split(',')[0].trim())) o.selected = true;
                    sel.appendChild(o);
                });
                sel.addEventListener('change', () => setVar(token.key, sel.value));
                row.appendChild(label);
                row.appendChild(sel);

            } else if (token.type === 'color') {
                const currentVal = getVar(token.key) || '#000000';
                const hexVal = cssColorToHex(currentVal);

                const wrap = document.createElement('div');
                wrap.style.display = 'flex'; wrap.style.alignItems = 'center'; wrap.style.gap = '4px';

                const swatch = document.createElement('div');
                Object.assign(swatch.style, {
                    width: '18px', height: '18px', borderRadius: '4px', cursor: 'pointer',
                    background: currentVal, border: '1px solid rgba(255,255,255,0.15)',
                    flexShrink: '0',
                });

                const picker = document.createElement('input');
                picker.type = 'color'; picker.value = hexVal;
                Object.assign(picker.style, { width: '0', height: '0', opacity: '0', position: 'absolute', pointerEvents: 'none' });

                swatch.addEventListener('click', () => picker.click());
                picker.addEventListener('input', () => {
                    setVar(token.key, picker.value);
                    swatch.style.background = picker.value;
                });

                wrap.appendChild(picker);
                wrap.appendChild(swatch);
                row.appendChild(label);
                row.appendChild(wrap);

            } else if (token.type === 'color-alpha') {
                const currentVal = getVar(token.key) || 'rgba(0,0,0,1)';
                const hexVal = cssColorToHex(currentVal);
                const alpha  = cssColorAlpha(currentVal);

                const wrap = document.createElement('div');
                Object.assign(wrap.style, { display: 'flex', alignItems: 'center', gap: '4px', flexShrink: '0' });

                const swatch = document.createElement('div');
                Object.assign(swatch.style, {
                    width: '18px', height: '18px', borderRadius: '4px', cursor: 'pointer',
                    background: currentVal, border: '1px solid rgba(255,255,255,0.15)',
                });

                const picker = document.createElement('input');
                picker.type = 'color'; picker.value = hexVal;
                Object.assign(picker.style, { width: '0', height: '0', opacity: '0', position: 'absolute', pointerEvents: 'none' });

                const alphaSlider = document.createElement('input');
                alphaSlider.type = 'range'; alphaSlider.min = '0'; alphaSlider.max = '1'; alphaSlider.step = '0.01';
                alphaSlider.value = alpha;
                Object.assign(alphaSlider.style, { width: '50px', accentColor: '#c9a84c', cursor: 'pointer' });

                function updateRgba() {
                    const hex = picker.value;
                    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
                    const a = parseFloat(alphaSlider.value);
                    const val = `rgba(${r},${g},${b},${a})`;
                    setVar(token.key, val);
                    swatch.style.background = val;
                }

                swatch.addEventListener('click', () => picker.click());
                picker.addEventListener('input', updateRgba);
                alphaSlider.addEventListener('input', updateRgba);

                wrap.appendChild(picker);
                wrap.appendChild(swatch);
                wrap.appendChild(alphaSlider);
                row.appendChild(label);
                row.appendChild(wrap);
            }

            scrollArea.appendChild(row);
        });
    }

    // ── Footer actions ─────────────────────────────────────────────────────
    const footer = document.createElement('div');
    Object.assign(footer.style, {
        padding: '8px 14px', display: 'flex', gap: '6px',
        borderTop: '1px solid rgba(201,168,76,0.1)',
    });

    const resetBtn = document.createElement('button');
    resetBtn.textContent = '↺ Reset';
    Object.assign(resetBtn.style, {
        flex: '1', fontSize: '10px', padding: '5px', borderRadius: '6px', cursor: 'pointer',
        background: 'rgba(239,68,68,0.1)', border: '1px solid rgba(239,68,68,0.3)', color: '#ef4444',
    });
    resetBtn.addEventListener('click', () => {
        localStorage.removeItem('nw_theme');
        TOKENS.filter(t => t.key).forEach(t => document.documentElement.style.removeProperty(t.key));
        refreshRows();
    });

    const copyBtn = document.createElement('button');
    copyBtn.textContent = '⧉ Copy CSS';
    Object.assign(copyBtn.style, {
        flex: '1', fontSize: '10px', padding: '5px', borderRadius: '6px', cursor: 'pointer',
        background: 'rgba(56,189,248,0.1)', border: '1px solid rgba(56,189,248,0.3)', color: '#38bdf8',
    });
    copyBtn.addEventListener('click', () => {
        const vars = TOKENS.filter(t => t.key).map(t => {
            const v = getComputedStyle(document.documentElement).getPropertyValue(t.key).trim()
                   || document.documentElement.style.getPropertyValue(t.key).trim();
            return `    ${t.key}: ${v};`;
        }).join('\n');
        navigator.clipboard.writeText(`:root {\n${vars}\n}`).then(() => {
            copyBtn.textContent = '✓ Copied!';
            setTimeout(() => copyBtn.textContent = '⧉ Copy CSS', 1800);
        });
    });

    footer.appendChild(resetBtn);
    footer.appendChild(copyBtn);

    // ── Assemble panel ─────────────────────────────────────────────────────
    panel.appendChild(header);
    panel.appendChild(presetBar);
    panel.appendChild(scrollArea);
    panel.appendChild(footer);

    document.body.appendChild(toggleBtn);
    document.body.appendChild(panel);

    // ── Toggle logic ───────────────────────────────────────────────────────
    let panelOpen = false;
    function openPanel()  { panelOpen = true;  panel.style.display = 'flex'; toggleBtn.style.boxShadow = '0 0 20px rgba(201,168,76,0.5)'; refreshRows(); }
    function closePanel() { panelOpen = false; panel.style.display = 'none'; toggleBtn.style.boxShadow = '0 0 14px rgba(201,168,76,0.25)'; }
    function togglePanel() { panelOpen ? closePanel() : openPanel(); }

    toggleBtn.addEventListener('click', togglePanel);
    header.querySelector('#tw-close').addEventListener('click', closePanel);

    // Ctrl+E hotkey
    document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'e') { e.preventDefault(); togglePanel(); }
    });

    // ── Drag to move ───────────────────────────────────────────────────────
    let dragging = false, dragStartX, dragStartY, panelStartRight, panelStartBottom;
    header.addEventListener('mousedown', (e) => {
        dragging = true;
        dragStartX = e.clientX; dragStartY = e.clientY;
        const rect = panel.getBoundingClientRect();
        panelStartRight  = window.innerWidth  - rect.right;
        panelStartBottom = window.innerHeight - rect.bottom;
        header.style.cursor = 'grabbing';
        e.preventDefault();
    });
    document.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const dx = dragStartX - e.clientX;
        const dy = dragStartY - e.clientY;
        panel.style.right  = Math.max(4, panelStartRight  + dx) + 'px';
        panel.style.bottom = Math.max(4, panelStartBottom + dy) + 'px';
        toggleBtn.style.right  = panel.style.right;
        toggleBtn.style.bottom = (parseFloat(panel.style.bottom) - 52) + 'px';
    });
    document.addEventListener('mouseup', () => {
        dragging = false;
        header.style.cursor = 'grab';
    });

    refreshRows();
})();

// ════════════════════════════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════════════════════════════
function isShipAtCoordinate(ship, x, y) {
    for (let i = 0; i < ship.size; i++) {
        if ((ship.x + (ship.orientation === 'H' ? i : 0)) === x &&
            (ship.y + (ship.orientation === 'V' ? i : 0)) === y) return true;
    }
    return false;
}
</script>
